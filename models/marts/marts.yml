  - name: mart_inventory_health
    description: "Salud del inventario y roturas de stock a nivel semanal."
    columns:
      - name: item_key
        description: "Clave del artículo."
        tests:
          - not_null
      - name: week_id
        description: "Semana del año."
        tests:
          - not_null
      - name: avg_weekly_stock
        description: "Stock semanal promedio."
      - name: weeks_of_stock
        description: "Semanas de stock disponible."
      - name: is_stockout_week
        description: "Indicador si hubo rotura de stock."
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: stock_trend
        description: "Tendencia del stock."
        tests:
          - accepted_values:
              arguments:
                values: ['creciente', 'decreciente', 'estable']