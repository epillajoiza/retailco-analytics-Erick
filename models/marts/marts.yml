version: 2

models:
  - name: mart_sales_by_channel
    description: "Métricas de ventas agregadas por canal, locación, categoría y mes."
    columns:
      - name: sale_month_sk
        description: "Clave primaria."
        tests:
          - unique
          - not_null
      - name: sales_channel
        description: "Canal de venta."
      - name: location_key
        description: "Locación de venta."
      - name: category_name
        description: "Categoría de producto."
      - name: year
        description: "Año de venta."
      - name: month
        description: "Mes de venta."
      - name: max_date_key
        description: "Última fecha de venta en el mes."
      - name: total_units_sold
        description: "Unidades totales vendidas."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: total_units_returned
        description: "Unidades totales devueltas."
      - name: total_gross_revenue
        description: "Ingreso bruto total."
      - name: total_return_amount
        description: "Monto total devuelto."
      - name: net_revenue
        description: "Ingreso neto después de devoluciones."
      - name: return_rate_pct
        description: "Tasa de devolución en porcentaje."
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 100
      - name: avg_discount_pct
        description: "Descuento promedio en porcentaje."

